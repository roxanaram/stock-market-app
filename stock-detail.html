    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>StockScope - Stock Detail</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
      <link rel="stylesheet" href="css/style.css" />
      <link rel="stylesheet" href="css/market.css" />
    </head>
    <body>
      <nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">
      <span class="brand-badge">S</span>StockScope
    </a>
    <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNavbar">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="market.html">Market</a></li>
        <li class="nav-item"><a class="nav-link" href="portfolio.html">Portfolio</a></li>
        <li class="nav-item"><a class="nav-link" href="pro.html">Pro</a></li>
        <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
      </ul>
    </div>
  </div>
</nav>


      <main>
        <section class="market-header">
          <div class="container">
            <div class="d-flex flex-wrap justify-content-between align-items-end gap-3">
              <div>
                <p class="text-muted-custom mb-1">Stock Detail</p>
                <h1 class="display-5 fw-bold">Company information and chart</h1>
              </div>

              <div class="d-flex flex-wrap gap-2 align-items-center">

              <button id="refreshDetailButton" class="btn btn-outline-light-custom btn-sm" type="button">
                Refresh data
              </button>
                <select id="currencySelect" class="form-select">
                  <option value="USD">USD</option>
                  <option value="EUR">EUR</option>
                  <option value="GBP">GBP</option>
                  <option value="JPY">JPY</option>
                  <option value="CHF">CHF</option>
                </select>
              </div>
            </div>


            <div class="mt-4 d-flex flex-wrap gap-2">
              <button class="btn btn-outline-light-custom time-range-btn" data-range="1D">1 Day</button>
              <button class="btn btn-outline-light-custom time-range-btn active" data-range="1M">1 Month</button>
              <button class="btn btn-outline-light-custom time-range-btn" data-range="3M">3 Months</button>
              <button class="btn btn-outline-light-custom time-range-btn" data-range="1Y">1 Year</button>
            </div>
          </div>
        </section>

        <section class="pb-5">
          <div class="container">
            <div id="notFoundMessage" class="empty-state">
              <h2>Stock not found</h2>
              <p>Please go back to the market page and choose a valid stock.</p>
              <a href="market.html" class="btn btn-accent">Back to market</a>
            </div>

            <div id="detailContainer"></div>
          </div>
        </section>
      </main>

      <footer>
        <div class="container text-center">
          View company information, price changes, and interactive charts.
        </div>
      </footer>

      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
      <script src="js/data.js"></script>
      <script src="js/api.js"></script>
      <script src="js/detail.js"></script>
    </body>
    </html>
